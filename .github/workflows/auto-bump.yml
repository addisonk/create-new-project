name: Auto-bump plugin version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip the workflow's own release commits to avoid loops.
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decide bump
        id: bump
        run: node scripts/auto-bump.mjs

      - name: Commit, tag, push
        if: steps.bump.outputs.bumped == 'true'
        env:
          NEW: ${{ steps.bump.outputs.to }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json
          git commit -m "chore: release v${NEW}"
          git tag -a "v${NEW}" -m "Release v${NEW}"
          git push origin main "v${NEW}"
